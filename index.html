<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Google+Sans+Display|Google+Sans+Text|Noto+Sans+SC">
    <link rel="stylesheet" id="hljs-theme" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" integrity="sha384-vlBdW0r3AcZO/HboRPznQNowvexd3fY8qHOWkBi5q7KGgqJ+F48+DceybYmrVbmB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/clipboard-js@0.3.6/index.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/clipboard-js@0.3.6/clipboard.min.js"></script>

    <!-- The loading of KaTeX is deferred to speed up page rendering -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js" integrity="sha384-AtrdNsnxl/75rvBneBVH7DtOvCxSVahR2zWqle1coBKd8DEmLoviqNeJSx64gNAs" crossorigin="anonymous"></script>

    <!-- To automatically render math in text elements, include the auto-render extension: -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/contrib/auto-render.min.js" integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" crossorigin="anonymous" defer></script>
    <script>
      (function() {
        const match = document.cookie.match(/(?:^|;\s*)themeMode=([^;]+)/);
        const stored = match ? decodeURIComponent(match[1]) : 'auto';
        const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const mode = stored === 'dark' || stored === 'light' ? stored : preferred;
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(mode);
        if (mode === "light") {
          document.querySelector("#hljs-theme").setAttribute("href", "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github.min.css");
        } else {
          document.querySelector("#hljs-theme").setAttribute("href", "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css");
        }
      })();
    </script>
    <link rel="stylesheet" type="text/css" href="styles/main.css">
    
    <title>Document</title>
  </head>
  <body>
    <div class="topbar-dropdown-menu">
      <button class="topbar-dropdown-item" data-theme="auto" type="button">
        <span class="material-icons">computer</span>
        <span>跟随浏览器</span>
      </button>
      <button class="topbar-dropdown-item" data-theme="light" type="button">
        <span class="material-icons">wb_sunny</span>
        <span>浅色</span>
      </button>
      <button class="topbar-dropdown-item" data-theme="dark" type="button">
        <span class="material-icons">nightlight</span>
        <span>深色</span>
      </button>
    </div>
    <div class="topbar">
      <!-- 删除了书签按钮 -->
      <a href="./" class="topbar-logo" aria-label="首页">
        <span class="logo-image" aria-hidden="true"></span>
      </a>
      <div class="topbar-actions">
        <a class="topbar-button topbar-link-button" href="https://johnzhang888.github.io/">
          <span class="material-icons">home</span>
          <span>主站</span>
        </a>
        <div class="topbar-dropdown">
          <button class="topbar-button topbar-theme-button" type="button" aria-haspopup="true" aria-expanded="false" onclick="switchDropdownMenu()">
            <span class="material-icons">computer</span>
            <span class="topbar-theme-label">跟随浏览器</span>
            <span class="material-icons">arrow_drop_down</span>
          </button>
          
        </div>
      </div>
    </div>

    <div class="mobile-drawer-scrim" hidden></div>
    <div class="mobile-drawer" hidden>
      <div class="drawer-header">
        <div class="drawer-tabs">
          <button class="drawer-tab drawer-tab-active" type="button" data-drawer-tab="list">文章列表</button>
          <button class="drawer-tab" type="button" data-drawer-tab="toc">目录</button>
        </div>
        <button class="drawer-close-button" type="button" aria-label="关闭侧边栏"><span class="material-icons">close</span></button>
      </div>
      <div class="drawer-panel drawer-panel-list"></div>
      <div class="drawer-panel drawer-panel-toc" hidden></div>
    </div>

    <!-- Floating action buttons -->
    <div class="floating-buttons">
      <button class="floating-button" id="copy-md-button" type="button" aria-label="复制 Markdown" title="复制 Markdown">
        <span class="material-icons">content_paste</span>
      </button>
      <button class="floating-button" id="back-to-top-button" type="button" aria-label="回到顶部" title="回到顶部">
        <span class="material-icons">keyboard_arrow_up</span>
      </button>
      <!-- 新增书签按钮，只在宽度小于1200px时显示 -->
      <button class="floating-button bookmark-button" id="bookmark-button" type="button" aria-label="打开侧边栏" title="打开侧边栏">
        <span class="material-icons">bookmark</span>
      </button>
    </div>

    <content></content>
    <script type="module" src="src/gen/main.js"></script>
    <script type="module" src="src/copy-markdown.js"></script>
    
    <script>
      // Initialize KaTeX rendering after DOM is loaded
      document.addEventListener('DOMContentLoaded', function() {
        // For index page, render any math that might be present
        if (typeof renderMathInElement !== 'undefined' && 
            new URLSearchParams(window.location.search).get("page") === null) {
          renderMathInElement(document.body, {
            delimiters: [
              {left: "$$", right: "$$", display: true},
              {left: "$", right: "$", display: false},
              {left: "\\(", right: "\\)", display: false},
              {left: "\\[", right: "\\]", display: true}
            ]
          });
        }
      });

      function switchDropdownMenu() {
        let menu = document.querySelector(".topbar-dropdown-menu");
        if (menu.style.display === "none" || !menu.style.display) {
          menu.style.display = "block";
        } else {
          menu.style.display = "none";
        }
      }

      // 点击下拉菜单项后关闭菜单
      document.querySelectorAll('.topbar-dropdown-item').forEach(item => {
        item.addEventListener('click', () => {
          document.querySelector('.topbar-dropdown-menu').style.display = 'none';
        });
      });

      // 点击菜单外部区域时关闭菜单
      document.addEventListener('click', (event) => {
        const menu = document.querySelector('.topbar-dropdown-menu');
        const themeButton = document.querySelector('.topbar-theme-button');
        
        // 如果点击的不是菜单本身也不是主题按钮，则关闭菜单
        if (!menu.contains(event.target) && !themeButton.contains(event.target)) {
          menu.style.display = 'none';
        }
      });
    </script>
  </body>

</html>
